---
- name: Install RKE2 agent on worker nodes
  hosts: workers
  become: true
  vars:
    rke2_version: "stable"
    rke2_config_dir: /etc/rancher/rke2
    cp_private_ip: "{{ hostvars[groups['control_plane'][0]]['ansible_default_ipv4']['address'] }}"
    rke2_node_token: "{{ hostvars[groups['control_plane'][0]]['rke2_node_token'] }}"

  tasks:
    - name: Create RKE2 config directory
      file:
        path: "{{ rke2_config_dir }}"
        state: directory
        mode: "0755"

    - name: Write RKE2 agent config
      copy:
        dest: "{{ rke2_config_dir }}/config.yaml"
        content: |
          server: https://{{ cp_private_ip }}:9345
          token: {{ rke2_node_token }}

    - name: Download and install RKE2 agent
      shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_CHANNEL={{ rke2_version }} INSTALL_RKE2_TYPE=agent sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable and start rke2-agent
      systemd:
        name: rke2-agent
        enabled: true
        state: started

    - name: Wait for agent to join cluster
      pause:
        seconds: 30
