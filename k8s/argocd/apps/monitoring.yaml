apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 61.3.0
      helm:
        valueFiles:
          - $values/k8s/platform/monitoring/kube-prometheus-stack-values.yaml
    - repoURL: https://github.com/nimamaghsoodi/verda-platform.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: apps
        kind: DaemonSet
        jsonPointers: ["/status"]
      - group: apps
        kind: Deployment
        jsonPointers: ["/status"]
      - group: apps
        kind: StatefulSet
        jsonPointers: ["/status"]
