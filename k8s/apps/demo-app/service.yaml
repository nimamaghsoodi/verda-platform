apiVersion: v1
kind: Service
metadata:
  name: demo-app-backend
  namespace: demo-app
  labels:
    app: demo-app
    component: backend
spec:
  selector:
    app: demo-app
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-frontend
  namespace: demo-app
  labels:
    app: demo-app
    component: frontend
spec:
  selector:
    app: demo-app
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
