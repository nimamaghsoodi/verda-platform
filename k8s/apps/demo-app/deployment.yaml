apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-backend
  namespace: demo-app
  labels:
    app: demo-app
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
      component: backend
  template:
    metadata:
      labels:
        app: demo-app
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: backend
          image: harbor.<CLUSTER_IP>.nip.io/demo/demo-app-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: demo-app-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      imagePullSecrets:
        - name: harbor-registry-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-frontend
  namespace: demo-app
  labels:
    app: demo-app
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
      component: frontend
  template:
    metadata:
      labels:
        app: demo-app
        component: frontend
    spec:
      containers:
        - name: frontend
          image: harbor.<CLUSTER_IP>.nip.io/demo/demo-app-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      imagePullSecrets:
        - name: harbor-registry-secret
