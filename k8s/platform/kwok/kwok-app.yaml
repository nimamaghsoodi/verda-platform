apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kwok
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: https://github.com/nimamaghsoodi/verda-platform.git
    targetRevision: HEAD
    path: k8s/platform/kwok
    directory:
      exclude: kwok-app.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
