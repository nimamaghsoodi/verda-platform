apiVersion: batch/v1
kind: Job
metadata:
  name: kwok-create-nodes
  namespace: kube-system
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: kwok-controller
      restartPolicy: OnFailure
      containers:
        - name: node-creator
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              for i in $(seq 1 10); do
                NODE="kwok-node-$(printf '%03d' $i)"
                kubectl get node $NODE 2>/dev/null && continue

                kubectl apply -f - <<EOF
              apiVersion: v1
              kind: Node
              metadata:
                name: $NODE
                annotations:
                  kwok.x-k8s.io/node: fake
                labels:
                  beta.kubernetes.io/arch: amd64
                  beta.kubernetes.io/os: linux
                  kubernetes.io/arch: amd64
                  kubernetes.io/hostname: $NODE
                  kubernetes.io/os: linux
                  node-role.kubernetes.io/worker: ""
                  kwok.x-k8s.io/node: fake
                  type: kwok
              spec:
                taints:
                  - key: kwok.x-k8s.io/node
                    value: fake
                    effect: NoSchedule
              EOF

                # Set valid kubelet version so Rancher doesn't error on version parsing
                kubectl patch node $NODE --subresource=status --type=merge -p \
                  '{"status":{"nodeInfo":{"kubeletVersion":"v1.35.5","kubeProxyVersion":"v1.35.5","osImage":"Ubuntu 22.04 LTS","operatingSystem":"linux","architecture":"amd64","containerRuntimeVersion":"kwok://v0.7.0","kernelVersion":"5.15.0-generic"}}}' 2>/dev/null || true
              done
              echo "Created 10 KWOK virtual nodes"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
