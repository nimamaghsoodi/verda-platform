---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kwok-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kwok-controller
rules:
  - apiGroups: [""]
    resources: [nodes, pods, configmaps, events]
    verbs: ["*"]
  - apiGroups: [""]
    resources: [nodes/status, pods/status]
    verbs: [update, patch]
  - apiGroups: [kwok.x-k8s.io]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kwok-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kwok-controller
subjects:
  - kind: ServiceAccount
    name: kwok-controller
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kwok-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kwok-controller
  template:
    metadata:
      labels:
        app: kwok-controller
    spec:
      serviceAccountName: kwok-controller
      containers:
        - name: kwok-controller
          image: registry.k8s.io/kwok/kwok:v0.7.0
          args:
            - --manage-all-nodes=false
            - --manage-nodes-with-annotation-selector=kwok.x-k8s.io/node=fake
            - --disregard-status-with-annotation-selector=kwok.x-k8s.io/status=custom
            - --cidr=10.0.0.1/24
            - --node-ip=10.0.0.1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
