apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.17.4
    helm:
      valuesObject:
        operator:
          replicas: 1
          prometheus:
            enabled: true
            serviceMonitor:
              enabled: true
        ipam:
          mode: kubernetes
        kubeProxyReplacement: true
        k8sServiceHost: 86.38.238.228
        k8sServicePort: 6443
        # Hubble — L7 network observability
        hubble:
          relay:
            enabled: true
          ui:
            enabled: true
          metrics:
            enabled:
              - dns
              - drop
              - tcp
              - flow
              - port-distribution
              - icmp
              - httpV2
            serviceMonitor:
              enabled: true
        prometheus:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
