controller:
  replicaCount: 2
  service:
    type: LoadBalancer
    # On bare-metal, use the worker node's public IP as external IP
    externalIPs: []   # populated post-provisioning: [WORKER1_IP, WORKER2_IP]
  config:
    use-real-ip: "true"
    proxy-real-ip-cidr: "0.0.0.0/0"
    log-format-upstream: '{"time":"$time_iso8601","remote_addr":"$proxy_protocol_addr","x_forward_for":"$proxy_add_x_forwarded_for","request_id":"$req_id","status":"$status","request":"$request","request_length":"$request_length","duration":"$request_time","method":"$request_method","http_referrer":"$http_referer","http_user_agent":"$http_user_agent"}'
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "10254"
