apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: platform
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.7.3
      helm:
        valuesObject:
          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            storage:
              type: filesystem
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h
          deploymentMode: SingleBinary
          singleBinary:
            replicas: 1
            persistence:
              enabled: true
              size: 10Gi
          # Promtail is deployed separately as a DaemonSet
          gateway:
            enabled: false
          monitoring:
            serviceMonitor:
              enabled: true
              namespace: monitoring
          test:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
